# Мониторинг кластера 1С 8.3 через RAS/RAC.
# Положить в C:\Program Files\Zabbix Agent\zabbix_agent2.d\ (или подключить в zabbix_agentd.conf)
# и перезапустить агент. Скрипт — в C:\Zabbix\Scripts\1c_cluster_ras.ps1
#
# Мастер-айтем: один вызов = один опрос RAS, из него JSONPath'ом достаются все метрики.
UserParameter=onecras.json,powershell -NoProfile -ExecutionPolicy Bypass -File "C:\Zabbix\Scripts\1c_cluster_ras.ps1" json

# LLD: информационные базы, рабочие процессы и рабочие серверы.
UserParameter=onecras.discovery.ib,powershell -NoProfile -ExecutionPolicy Bypass -File "C:\Zabbix\Scripts\1c_cluster_ras.ps1" discovery.ib
UserParameter=onecras.discovery.process,powershell -NoProfile -ExecutionPolicy Bypass -File "C:\Zabbix\Scripts\1c_cluster_ras.ps1" discovery.process
UserParameter=onecras.discovery.server,powershell -NoProfile -ExecutionPolicy Bypass -File "C:\Zabbix\Scripts\1c_cluster_ras.ps1" discovery.server

# Таймаут агента заведомо должен быть больше времени опроса RAS:
# Timeout=30
