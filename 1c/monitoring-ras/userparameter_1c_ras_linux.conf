# Мониторинг кластера 1С 8.3 через RAS/RAC — Linux (Zabbix agent + bash/awk).
# Внешних зависимостей нет: нужен только rac (из платформы 1С) и awk + coreutils.
# PowerShell НЕ требуется.
# Положить в /etc/zabbix/zabbix_agentd.d/ (или .../zabbix_agent2.d/) и перезапустить агент.
# Скрипт — /etc/zabbix/scripts/1c_cluster_ras.sh (chmod +x).
#
# Аргументы ключа: [<RAS сервер:порт>, <админ кластера>, <пароль>] — задаются
# из шаблона макросами {$RAS.SERVER}, {$RAS.CLUSTER.USER}, {$RAS.CLUSTER.PWD}.
#
# Мастер-айтем: один вызов = один опрос RAS, из него JSONPath'ом достаются все метрики.
UserParameter=onecras.json[*],/etc/zabbix/scripts/1c_cluster_ras.sh json "$1" "$2" "$3"

# LLD: информационные базы, рабочие процессы и рабочие серверы.
UserParameter=onecras.discovery.ib[*],/etc/zabbix/scripts/1c_cluster_ras.sh discovery.ib "$1" "$2" "$3"
UserParameter=onecras.discovery.process[*],/etc/zabbix/scripts/1c_cluster_ras.sh discovery.process "$1" "$2" "$3"
UserParameter=onecras.discovery.server[*],/etc/zabbix/scripts/1c_cluster_ras.sh discovery.server "$1" "$2" "$3"

# Таймаут агента заведомо должен быть больше времени опроса RAS:
# Timeout=30
